# Context Properties - See https://hub.docker.com/r/brightspot/tomcat for more info.

# Solr Database
dari/database/brightspot/delegate/solr/class=com.psddev.dari.solr.SolrDatabase
dari/database/brightspot/delegate/solr/clientSupplierClass=com.psddev.dari.solr.client.HttpSolrClientSupplier
dari/database/brightspot/delegate/solr/client/baseServerUrl=http://solr:8080/solr
dari/database/brightspot/delegate/solr/collection=collection1
dari/database/brightspot/delegate/solr/saveData=false

# PDFreactor Web Service, addressed by compose service name (this file is
# read inside the tomcat container, where 127.0.0.1 would be tomcat itself).
pdfreactor/serviceUrl=http://pdfreactor:9423/service/rest
# Base URL for the publish-automation permalink fetch (the Task has no
# request context; tomcat fetches its own rendered page over localhost).
pdfreactor/internalRenderBaseUrl=http://localhost:8080
# Dev-only: enable the unauthenticated /cms/_seed-ui-test bootstrap endpoint
# for the Playwright UI suite. Off by default everywhere; only this local dev
# stack opts in. (The endpoint also refuses to run in production mode.)
pdfreactor/uiTestSeedEnabled=true
