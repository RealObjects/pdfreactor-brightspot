name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      # Unit tests + checkstyle; also builds web/build/libs/web.war for the
      # UI-test stack below.
      - name: Build and unit tests
        run: ./gradlew build

      # End-to-end against a real PDFreactor container (Testcontainers).
      # No license key is present in CI, so the service runs in evaluation
      # mode (watermarked output); the suite's license-sensitive assertions
      # adapt to that. To run licensed, provide a PDFREACTOR_LICENSE secret
      # and write it to licensekey.xml before this step.
      - name: End-to-end tests
        run: ./gradlew :plugin:e2eTest

      # Playwright UI suite against the full local CMS stack.
      - name: Start CMS stack
        run: docker compose up -d

      - name: Wait for the CMS to come up
        run: |
          echo "Waiting for the seed endpoint (CMS deployed and bootstrapped)…"
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              http://localhost/cms/_seed-ui-test || true)
            if [ "$code" = "200" ]; then
              echo "CMS up after ~$((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "CMS did not come up in time (last status: $code)"
          docker compose ps
          docker compose logs --tail 100 tomcat
          exit 1

      - name: UI tests (Playwright)
        run: ./gradlew :plugin:uiTest

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --tail 300 tomcat pdfreactor || true

      - name: Stop CMS stack
        if: always()
        run: docker compose down
